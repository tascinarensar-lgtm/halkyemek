        * `PAYOUT_CONFIRMED` - Payout Confirmed
        * `BALANCE_LOW` - Balance Low
        * `SYSTEM_BROADCAST` - System Broadcast
    Wallet:
      type: object
      properties:
        user_id:
          type: integer
          readOnly: true
        balance:
          type: integer
          readOnly: true
          description: Kuruş cinsinden kullanılabilir bakiye
        pending_balance:
          type: integer
          readOnly: true
          description: Kuruş cinsinden settlement bekleyen bakiye
        is_active:
          type: boolean
          readOnly: true
        restriction_reason:
          type: string
          readOnly: true
        restricted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        ledger_in_sync:
          type: boolean
          readOnly: true
        pending_ledger_in_sync:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - balance
      - created_at
      - is_active
      - ledger_in_sync
      - pending_balance
      - pending_ledger_in_sync
      - restricted_at
      - restriction_reason
      - updated_at
      - user_id
    WalletTransaction:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        transaction_type:
          allOf:
          - $ref: '#/components/schemas/WalletTransactionTransactionTypeEnum'
          readOnly: true
        amount:
          type: integer
          readOnly: true
          description: Kuruş cinsinden signed işlem tutarı
        before_balance:
          type: integer
          readOnly: true
          description: İşlem öncesi bakiye
        after_balance:
          type: integer
          readOnly: true
          description: İşlem sonrası bakiye
        order_id:
          type: integer
          readOnly: true
          nullable: true
        provider_event_id:
          type: string
          readOnly: true
          nullable: true
        payment_intent_id:
          type: integer
          readOnly: true
          nullable: true
        description:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - after_balance
      - amount
      - before_balance
      - created_at
      - description
      - id
      - order_id
      - payment_intent_id
      - provider_event_id
      - transaction_type
    WalletTransactionTransactionTypeEnum:
      enum:
      - TOP_UP
      - PURCHASE
      - REFUND
      - ADJUSTMENT
      - REVERSAL
      - CHARGEBACK
      type: string
      description: |-
        * `TOP_UP` - Top Up
        * `PURCHASE` - Purchase
        * `REFUND` - Refund
        * `ADJUSTMENT` - Adjustment
        * `REVERSAL` - Reversal
        * `CHARGEBACK` - Chargeback
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
