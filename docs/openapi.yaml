openapi: 3.0.3
info:
  title: HalkYemek API
  version: dev
  description: Beylikdüzü odaklı QR + Wallet yemek sistemi
paths:
  /api/v1/auth/google/:
    post:
      operationId: auth_google_login
      description: Google ID token ile giriş yapar, JWT access/refresh token döndürür.
        role alanı artık kabul edilmez.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
        required: true
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoogleLoginResponse'
              examples:
                GoogleLoginSuccess:
                  value:
                    access: jwt-access-token
                    refresh: jwt-refresh-token
                    is_new: false
                    user:
                      id: 12
                      username: g_1133557799
                      google_email: user@example.com
                    has_business_membership: true
                    business_membership_count: 1
                    businesses:
                    - id: 4
                      name: Halk Lokantası Beylikdüzü
                      member_role: MANAGER
                  summary: Google login success
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: api_v1_auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/v1/auth/refresh/:
    post:
      operationId: api_v1_auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
